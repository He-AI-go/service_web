<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI客服助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .loading {
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card h-100 border-0">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">AI客服助手</h5>
        </div>
        <div class="card-body chat-content" id="chatContent">
            <div class="text-center text-muted mb-3">
                您好！我是物流培训AI客服，有什么可以帮您？
            </div>
        </div>
        <div class="card-footer p-3">
            <form id="chatForm" class="d-flex gap-2">
                <input type="text" class="form-control" id="chatInput" placeholder="输入您的问题...">
                <button type="button" id="sendChatBtn" class="btn btn-primary">发送</button>
            </form>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 发送消息逻辑（对接后端API）
            function sendMessage() {
                let question = $('#chatInput').val().trim();
                if (!question) return;

                // 1. 追加用户消息到聊天框
                $('#chatContent').append(`
                    <div class="d-flex justify-content-end mb-2">
                        <div class="bg-primary text-white p-2 rounded-3 max-w-75">${question}</div>
                    </div>
                `);
                $('#chatInput').val('');  // 清空输入框
                $('#chatContent').scrollTop($('#chatContent')[0].scrollHeight);  // 滚动到底部

                // 2. 显示加载中提示
                let loadingId = `loading-${Date.now()}`;
                $('#chatContent').append(`
                    <div id="${loadingId}" class="d-flex justify-content-start mb-2">
                        <div class="bg-light text-dark p-2 rounded-3 max-w-75 loading">
                            <i class="bi bi-hourglass-split"></i> 正在思考中...
                        </div>
                    </div>
                `);
                $('#chatContent').scrollTop($('#chatContent')[0].scrollHeight);

                // 3. 调用后端chat_api接口
                $.post("{% url 'training:chat_api' %}", {
                    question: question
                }, function(res) {
                    // 移除加载中提示
                    $(`#${loadingId}`).remove();

                    // 追加AI回复
                    if (res.code === 200) {
                        $('#chatContent').append(`
                            <div class="d-flex justify-content-start mb-2">
                                <div class="bg-light text-dark p-2 rounded-3 max-w-75">${res.data.answer}</div>
                            </div>
                        `);
                    } else {
                        // 接口异常时的友好提示
                        $('#chatContent').append(`
                            <div class="d-flex justify-content-start mb-2">
                                <div class="bg-light text-dark p-2 rounded-3 max-w-75">${res.data.answer}</div>
                            </div>
                        `);
                    }
                    $('#chatContent').scrollTop($('#chatContent')[0].scrollHeight);
                }).fail(function() {
                    // 网络异常时的提示
                    $(`#${loadingId}`).remove();
                    $('#chatContent').append(`
                        <div class="d-flex justify-content-start mb-2">
                            <div class="bg-light text-dark p-2 rounded-3 max-w-75">网络异常，请检查后重试。</div>
                        </div>
                    `);
                    $('#chatContent').scrollTop($('#chatContent')[0].scrollHeight);
                });
            }

            // 点击发送按钮
            $('#sendChatBtn').click(sendMessage);
            // 回车发送
            $('#chatInput').keypress(function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
