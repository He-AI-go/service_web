{% extends 'training/base.html' %}
{% block title %}管理员登录 - 物流培训系统{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white text-center">
                <h5 class="mb-0">管理员登录</h5>
            </div>
            <div class="card-body p-4">
                <form id="adminLoginForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">管理员账号</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">登录密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="button" class="btn btn-danger w-100" id="adminLoginBtn">登录</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
$(document).ready(function() {
    $('#adminLoginBtn').click(function() {
        let username = $('#username').val().trim();
        let password = $('#password').val().trim();
        if (!username || !password) {
            alert('账号和密码不能为空');
            return;
        }
        $.ajax({
            url: "{% url 'training:admin_login' %}",
            type: 'POST',
            data: {
                username: username,
                password: password,
                csrfmiddlewaretoken: $('input[name=csrfmiddlewaretoken]').val()
            },
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    alert(res.msg);
                    window.location.href = res.url;
                } else {
                    alert('登录失败：' + res.msg);
                }
            },
            error: function() {
                alert('网络错误，请重试');
            }
        });
    });
    // 回车键登录
    $('#password').keydown(function(e) {
        if (e.keyCode === 13) {
            $('#adminLoginBtn').click();
        }
    });
});
</script>
{% endblock %}
