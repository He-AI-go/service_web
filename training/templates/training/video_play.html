{% extends 'training/base.html' %}
{% block title %}{{ chapter.name }} - 视频播放{% endblock %}
{% block content %}
<div class="card shadow-sm mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <a href="{% url 'training:course_chapter' course.id %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回章节
        </a>
        <h6 class="mb-0">{{ chapter.name }}</h6>
    </div>
    <div class="card-body">
        <!-- 视频播放：禁用所有控制，纯前端自定义 -->
        <div class="ratio ratio-16x9 mb-3">
            <video id="trainVideo" class="w-100 border" controls oncontextmenu="return false;">
                <source src="{{ video_url }}" type="video/mp4">
                您的浏览器不支持视频播放，请使用Chrome/Edge/Firefox。
            </video>
        </div>
        <div class="text-center text-muted small">
            温馨提示：视频不支持拖动、倍速、下载，请完整播放完成学习。
        </div>
    </div>
</div>
{% endblock %}
{% block js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.js"></script>
<script>
$(function() {
    let video = document.getElementById('trainVideo');
    let chapterId = {{ chapter.id }};
    let isMarked = false; // 防止重复标记

    // 禁用进度条拖动
    video.addEventListener('seeking', function() {
        if (!this.paused) {
            this.currentTime = 0; // 拖放则回到开头
            alert('视频不支持拖动，请从头播放！');
        }
    });

    // 禁用倍速播放
    video.addEventListener('ratechange', function() {
        this.playbackRate = 1; // 强制1倍速
        alert('视频不支持倍速播放，请使用1倍速观看！');
    });

    // 播放完成后标记学习记录
    video.addEventListener('ended', function() {
        if (isMarked) return;
        // AJAX标记完成
        $.ajax({
            url: "{% url 'training:mark_complete' %}",
            type: 'POST',
            data: {chapter_id: chapterId},
            dataType: 'json',
            success: function(res) {
                if (res.code === 200) {
                    alert('视频播放完成，学习记录已标记！');
                    isMarked = true;
                } else {
                    alert(res.msg);
                }
            },
            error: function() {
                alert('标记失败，请手动刷新页面重试');
            }
        });
    });

    // 禁用视频右键菜单（防止下载）
    $('#trainVideo').on('contextmenu', function() {
        return false;
    });
});
</script>
{% endblock %}
