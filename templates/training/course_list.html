<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课程详情页 - 物流培训系统</title>
    <style>
        /* 视频播放容器样式 */
        .video-container {
            width: 80%;
            margin: 20px auto;
            border: 1px solid #ddd;
            padding: 10px;
        }
        video {
            width: 100%;
            outline: none;
        }
        .tip {
            color: red;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h3 id="chapter-name">【章节名称】</h3>
        <!-- 视频播放核心组件 -->
        <video id="course-video" controls controlsList="nodownload" oncontextmenu="return false;">
            <source src="" type="video/mp4">
            您的浏览器不支持HTML5视频播放，请升级浏览器！
        </video>
        <div class="tip" id="path-tip" style="display: none;"></div>
        <div class="tip" id="status-tip" style="color: green; display: none;">该章节已完成学习！</div>
    </div>

    <!-- 引入jQuery（CDN） -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script>
        // 全局参数（实际项目从登录态/URL中获取）
        const employeeId = 1; // 员工ID，替换为实际登录员工ID
        const chapterId = {{ chapter.id }}; // 章节ID，Django模板渲染
        const resourceId = {{ video_resource.id }}; // 视频资源ID，Django模板渲染

        // 1. 页面加载时校验学习路径
        $(function() {
            checkLearningPath();
            initVideoPlayer();
        });

        // 2. 学习路径校验
        function checkLearningPath() {
            $.get('/training/check_learning_path/', {
                employee_id: employeeId,
                chapter_id: chapterId
            }, function(res) {
                if (res.code === 200) {
                    // 校验通过，加载视频
                    $('#course-video').attr('src', `/training/video/${resourceId}/?employee_id=${employeeId}`);
                } else {
                    // 校验失败，提示并禁用播放
                    $('#path-tip').text(res.msg).show();
                    $('#course-video').prop('controls', false);
                }
            });
        }

        // 3. 初始化视频播放器（禁用倍速/拖动）
        function initVideoPlayer() {
            const video = document.getElementById('course-video');

            // 禁用右键菜单（防止下载）
            video.oncontextmenu = function() { return false; };

            // 禁用倍速功能
            video.addEventListener('loadedmetadata', function() {
                // 隐藏倍速控件（兼容大部分浏览器）
                const tracks = video.textTracks;
                for (let i = 0; i < tracks.length; i++) {
                    tracks[i].mode = 'hidden';
                }
                // 强制设置播放速度为1倍
                video.playbackRate = 1;
                // 监听倍速修改，强制还原
                video.addEventListener('ratechange', function() {
                    video.playbackRate = 1;
                });
            });

            // 禁用进度条拖动（核心：防止跳过学习）
            video.addEventListener('seeking', function(e) {
                // 获取当前播放进度
                const currentTime = video.currentTime;
                // 如果拖动的位置和当前进度差>1秒，禁止拖动
                if (Math.abs(e.target.currentTime - currentTime) > 1) {
                    video.currentTime = currentTime;
                    alert('禁止拖动进度条，请完整观看视频！');
                }
            });

            // 4. 实时更新播放进度（每5秒一次）
            setInterval(function() {
                if (!video.paused && video.duration) {
                    const progress = Math.floor((video.currentTime / video.duration) * 100);
                    updateLearningStatus(progress);
                    // 如果播放完成（进度≥98%，兼容视频末尾误差）
                    if (progress >= 98) {
                        updateLearningStatus(100); // 标记为完成
                        $('#status-tip').show();
                        video.pause();
                    }
                }
            }, 5000);
        }

        // 5. 调用后端接口更新学习状态
        function updateLearningStatus(progress) {
            $.post('/training/update_learning_status/', {
                employee_id: employeeId,
                chapter_id: chapterId,
                play_progress: progress
            }, function(res) {
                if (res.code !== 200) {
                    console.log('更新学习状态失败：', res.msg);
                }
            });
        }
    </script>
</body>
</html>
