<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物流培训平台-课程列表</title>
    <!-- 引入Bootstrap（和你之前的静态页一致，保证样式） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>物流培训课程列表</h2>
        <!-- 课程列表卡片：循环渲染courses数据 -->
        <div class="row mt-3">
            {% for course in courses %}
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ course.name }}</h5>
                        <p class="card-text">分类：{{ course.category.name }}</p>
                        <p class="card-text">难度：{{ course.get_difficulty_display }}</p>
                        <p class="card-text">学习人数：{{ course.learn_count }}</p>
                        <!-- 跳转到课程详情页（后续开发） -->
                        <a href="{% url 'course_detail' course_id=course.id %}" class="btn btn-primary">查看详情</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <!-- 无课程时的提示 -->
            <p class="text-muted">暂无课程数据</p>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
